<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Altos Distributor</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body id="page-admin">
    <header class="site-header admin-header">
        <div class="site-branding">
            <div class="brand-logo">ALTOS</div>
            <div>
                <h1>Admin Dashboard</h1>
                <p>Buy your own products from Altos</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="nav-link">Shop</a>
            <a href="articles.html" class="nav-link">Articles</a>
            <a href="cart.html" class="nav-link">Cart <span id="cart-badge">0</span></a>
            <a href="admin.html" class="nav-link active">Admin</a>
        </nav>
    </header>

    <main class="page-content admin-content">
        <section class="admin-panel" id="admin-panel">
            <div id="login-card" class="login-card">
                <h2>Admin Login</h2>
                <form id="admin-login-form">
                    <label for="admin-username">Username</label>
                    <input id="admin-username" name="username" type="text" placeholder="Enter username" required />

                    <label for="admin-password">Password</label>
                    <input id="admin-password" name="password" type="password" placeholder="Enter password" required />

                    <button type="submit" class="button button-primary">Login</button>
                </form>
            </div>

            <div id="admin-content" class="hidden">
                <div class="admin-tabs">
                    <button id="tab-orders" class="button button-primary">Orders</button>
                    <button id="tab-products" class="button button-secondary">Products</button>
                    <button id="logout-button" class="button button-secondary">Logout</button>
                </div>

                <div id="orders-panel">
                    <div class="orders-header">
                        <h2>Recent Orders</h2>
                    </div>

                    <!-- Revenue and Orders Summary Cards -->
                    <div class="admin-summary-cards" id="admin-summary-cards">
                        <div class="summary-card">
                            <span class="card-label">Total Orders</span>
                            <strong class="card-value" id="summary-total-orders">0</strong>
                        </div>
                        <div class="summary-card">
                            <span class="card-label">Total Revenue</span>
                            <strong class="card-value" id="summary-total-revenue">₹0.00</strong>
                        </div>
                        <div class="summary-card">
                            <span class="card-label">UPI Revenue</span>
                            <strong class="card-value" id="summary-upi-revenue">₹0.00</strong>
                        </div>
                        <div class="summary-card">
                            <span class="card-label">COD Revenue</span>
                            <strong class="card-value" id="summary-cod-revenue">₹0.00</strong>
                        </div>
                    </div>

                    <div id="orders-list"></div>
                </div>

                <div id="products-panel" class="hidden">
                    <div class="orders-header">
                        <h2>Product Management</h2>
                        <button id="new-product-button" class="button button-primary">New Product</button>
                    </div>
                    <div id="product-list"></div>
                    <div id="product-form" class="product-form hidden">
                        <div class="product-form-container">
                            <h3 id="product-form-title">Add Product</h3>
                            <form id="product-edit-form">
                                <label for="product-id">Product Code</label>
                                <input id="product-id" name="id" type="text" required />

                                <label for="product-name">Name</label>
                                <input id="product-name" name="name" type="text" required />

                                <label for="product-category">Category</label>
                                <input id="product-category" name="category" type="text" required />

                                <label for="product-unit">Unit</label>
                                <input id="product-unit" name="unit" type="text" required />

                                <label for="product-mrp">MRP</label>
                                <input id="product-mrp" name="mrp" type="number" step="0.01" required />


                                <label for="product-description">Description</label>
                                <textarea id="product-description" name="description" rows="4"></textarea>

                                <div class="admin-form-actions">
                                    <button type="submit" class="button button-primary">Save product</button>
                                    <button id="cancel-product" type="button" class="button button-secondary">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Order edit UI removed -->
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Want to buy Altos products? Add products to cart and checkout now.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
