<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Altos Distributor</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body id="page-cart">
    <header class="site-header">
        <div class="site-branding">
            <div class="brand-logo">ALTOS</div>
            <div>
                <h1>Your Cart</h1>
                <p>Buy your own products from Altos</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="nav-link">Shop</a>
            <a href="cart.html" class="nav-link active">Cart <span id="cart-badge">0</span></a>
            <a href="admin.html" class="nav-link">Admin</a>
        </nav>
    </header>

    <main class="page-content">
        <section class="cart-panel">
            <div id="cart-items"></div>
            <div class="cart-summary">
                <div>
                    <h2>Order summary</h2>
                    <p>Total items: <span id="summary-count">0</span></p>
                    <p>Total amount: <strong>₹<span id="summary-total">0.00</span></strong></p>
                </div>
                <div class="actions">
                    <a href="index.html" class="button button-secondary">Continue shopping</a>
                    <a id="checkout-button" href="checkout.html" class="button button-primary">Proceed to Checkout</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Want to buy Altos products? Add products to cart and checkout now.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
